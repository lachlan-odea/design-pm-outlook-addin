name: Deploy add-in to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Compute base URL
        id: base
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "PAGES_BASE=/$REPO/" >> "$GITHUB_OUTPUT"
          echo "BASE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io/$REPO" >> "$GITHUB_OUTPUT"
      - name: Build site
        env:
          VITE_BASE: ${{ steps.base.outputs.PAGES_BASE }}
        run: npm run build
      - name: Build production manifest
        env:
          BASE_URL: ${{ steps.base.outputs.BASE_URL }}
        run: npm run manifest:prod
      - name: Copy manifest into dist
        run: cp manifest.prod.xml dist/manifest.xml
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
